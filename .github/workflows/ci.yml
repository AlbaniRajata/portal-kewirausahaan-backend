name: Backend CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
        postgres-version: [15]

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: node migrations/run.js
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/portal_test

      - name: Run tests
        run: npm run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/portal_test
          JWT_SECRET: test-jwt-secret-key
          JWT_EXPIRES_IN: 1h
          BCRYPT_SALT_ROUNDS: 10
          UPLOAD_DIR: ./uploads
          ALLOWED_ORIGINS: http://localhost:5173
          GMAIL_USER: test@gmail.com
          GMAIL_APP_PASSWORD: test-password

      - name: Verify server startup
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/portal_test
          JWT_SECRET: test-jwt-secret-key
          JWT_EXPIRES_IN: 1h
          BCRYPT_SALT_ROUNDS: 10
          UPLOAD_DIR: ./uploads
          ALLOWED_ORIGINS: http://localhost:5173
          GMAIL_USER: test@gmail.com
          GMAIL_APP_PASSWORD: test-password
        run: |
          npm run start &
          SERVER_PID=$!
          sleep 5
          curl -H "Origin: http://localhost:5173" -f http://localhost:3000/health || {
            kill $SERVER_PID
            exit 1
          }
          kill $SERVER_PID

  deploy:
    name: Deploy Backend (rsync)
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT || 22 }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'coverage' \
            --exclude 'logs' \
            --exclude 'uploads' \
            -e "ssh -p ${{ secrets.SSH_PORT || 22 }}" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/albi/backend/"
